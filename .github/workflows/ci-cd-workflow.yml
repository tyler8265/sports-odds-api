name: ci-cd-workflow.yml

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL}}
        run: pytest -v
  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      -
        name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: tyler8265/odds-api-repo:latest
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull tyler8265/odds-api-repo:latest
            docker stop odds_api || true
            docker rm odds_api || true
            docker stop $(docker ps -q --filter "publish=8000") || true
            docker rm $(docker ps -aq --filter "publish=8000") || true
            docker run -d -p 8000:8000 -e ODDS_API_KEY=${{ secrets.ODDS_API_KEY }} -e DATABASE_URL=${{ secrets.DATABASE_URL }} --name odds_api tyler8265/odds-api-repo:latest







